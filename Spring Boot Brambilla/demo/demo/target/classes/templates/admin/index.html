<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Gestione Foto</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h1>Admin Fotoalbum</h1>
    <form th:action="@{/admin/save}" method="post" class="card p-4 mb-4">
        <input type="text" name="title" placeholder="Titolo Foto" class="form-control mb-2" required>
        <input type="text" name="url" placeholder="URL Immagine" class="form-control mb-2" required>
        <button type="submit" class="btn btn-success">Salva Foto</button>
    </form>
    <table class="table">
        <thead><tr><th>Titolo</th><th>Anteprima</th><th>Azioni</th></tr></thead>
        <tbody>
            <tr th:each="p : ${photos}">
                <td th:text="${p.title}"></td>
                <td><img th:src="${p.url}" width="80"></td>
                <td><a th:href="@{'/admin/delete/' + ${p.id}}" class="btn btn-danger btn-sm">Elimina</a></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
