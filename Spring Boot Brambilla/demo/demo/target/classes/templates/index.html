<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Photo Gallery</title>
    <!-- Bootstrap per lo stile veloce -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .photo-card { margin-bottom: 20px; transition: transform .2s; }
        .photo-card:hover { transform: scale(1.05); }
        .img-fluid { border-radius: 8px; object-fit: cover; height: 250px; width: 100%; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand">Il Mio Fotoalbum</span>
            <a href="/admin" class="btn btn-outline-light btn-sm">Area Admin</a>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <!-- Ciclo sulle foto caricate nel DB -->
            <div class="col-md-4 photo-card" th:each="p : ${photos}">
                <div class="card shadow-sm">
                    <img th:src="${p.url}" class="img-fluid" th:alt="${p.title}">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${p.title}">Titolo</h5>
                        <p class="card-text text-muted" th:text="${p.description}">Descrizione</p>
                    </div>
                </div>
            </div>
            <!-- Messaggio se non ci sono foto -->
            <div class="col-12 text-center" th:if="${#lists.isEmpty(photos)}">
                <p class="lead">Non ci sono ancora foto nella galleria. Vai nell'area admin per aggiungerle!</p>
            </div>
        </div>
    </div>
</body>
</html>
